# Experiment 3: search cost x initial inequality.
#
# 30% of agents spawn rich (200-300 resources), 70% poor (40-80).
# Partner search has a real cost — the rich can afford k>base_k candidates,
# the poor get stuck with few evaluations.
# With trait_generalization_strength > 0, the initial wealth sorting
# correlates with traits over time and can lock in.

seed                     = 42
max_ticks                = 30000
initial_population       = 60

initial_resources_min    = 40
initial_resources_max    = 80
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.3
trust_success_weight     = 0.5

trust_gain_on_success    = 0.15
trust_loss_on_failure    = 0.10
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

# Bimodal spawn: 30% start with 200-300 energy, 70% with 40-80.
initial_resource_rich_frac = 0.3
initial_resources_rich_min = 200
initial_resources_rich_max = 300

# Partner search: base of 3 candidates, +1 every 50 energy above threshold 100.
search_base_k              = 3
search_min_k               = 2
search_max_k               = 30
search_slope               = 0.02
search_wealth_threshold    = 100.0
search_cost_per_candidate  = 0.1

trait_generalization_strength = 0.2

coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

snapshot_interval        = 2000
log_events               = 0
output_dir               = output/inequality
