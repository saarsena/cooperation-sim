# Experiment 4: new-entrant penalty.
#
# Existing trait generalization + frequent spawns → new agents
# inherit their group's accumulated stigma or credit from day one.
# To amplify the signal we use a small population (so "dominant
# incumbent traits" exist) and a rapid spawn cadence.

seed                     = 42
max_ticks                = 20000
initial_population       = 25

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.3
trust_success_weight     = 0.5

trust_gain_on_success    = 0.15
trust_loss_on_failure    = 0.10
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

# Fast inflow: one new agent every 20 ticks.
spawn_interval           = 20

trait_generalization_strength = 0.35

coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

# Keep events.log on — needed to correlate agent_birth → venture_success/failure.
snapshot_interval        = 2000
log_events               = 1
output_dir               = output/new_entrant
