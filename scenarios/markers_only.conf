# Experiment 2: pure marker discrimination.
#
# Traits carry NO real information about cooperative quality
# (coop_quality_sigma = 0, trait_quality_correlation = 0, weights = 0).
# The only new mechanic enabled is trait_generalization_strength.
#
# Expected result: within-group trust diverges above across-group trust
# over time — discrimination emerges from a meaningless marker.

seed                     = 42
max_ticks                = 30000
initial_population       = 40

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.3
trust_success_weight     = 0.5

trust_gain_on_success    = 0.15
trust_loss_on_failure    = 0.10
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

# Trait generalization IS the lever. 0.3 is a moderate setting.
trait_generalization_strength = 0.6

# Leave hidden quality completely flat — traits are markers only.
coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

snapshot_interval        = 2000
log_events               = 0
output_dir               = output/markers_only
