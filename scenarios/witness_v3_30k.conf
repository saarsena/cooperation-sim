# Witness V3 — Phase 3 (memory + cultural transmission).
#
# Same dynamics as witness_v2_30k, plus memory_enabled=1 turning on
# kin-mediated, single-step story transmission along the social-ancestor
# edge. New agents inherit a (decay-scaled) copy of their picked
# ancestor's Stories inventory; touchstone events (fires, notable deaths)
# are added at full fidelity at the moment of witnessing.
#
# story_inherit_decay default 0.92/year is provisional. Calibration sweep
# at {0.85, 0.90, 0.92, 0.95, 0.97} chooses the value where biographies
# feel like a generation's worth of inherited memory.

seed                     = 42
max_ticks                = 30000
initial_population       = 40

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.4
trust_success_weight     = 0.5

trust_gain_on_success    = 0.10
trust_loss_on_failure    = 0.15
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

trait_generalization_strength = 0.6

coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

places_enabled                  = 1
world_events_enabled            = 1
memory_enabled                  = 1

snapshot_interval        = 2000
snapshot_at_tick_zero    = 1
log_events               = 1
output_dir               = output/witness_v3_30k
