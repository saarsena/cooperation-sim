# Experiment 1: regression check.
#
# All 7-rule extensions are set to their null values. Dynamics should
# approximate default.conf (not byte-identical because random trait and
# quality draws at spawn still consume RNG, but the population / trust
# / Gini trajectories should look statistically equivalent).

seed                     = 42
max_ticks                = 20000
initial_population       = 20

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.3
trust_success_weight     = 0.5

trust_gain_on_success    = 0.15
trust_loss_on_failure    = 0.10
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

# All extensions null.
trait_generalization_strength = 0.0
coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

snapshot_interval        = 2000
log_events               = 1
output_dir               = output/regression
