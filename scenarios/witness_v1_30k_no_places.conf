# 30k control on the current witness-world branch: identical code path to
# witness_v1_30k (LastActive maintained, place_id column written) but with
# places_enabled=0. Apples-to-apples for "does inheritance change dynamics."

seed                     = 42
max_ticks                = 30000
initial_population       = 40

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.4
trust_success_weight     = 0.5

trust_gain_on_success    = 0.10
trust_loss_on_failure    = 0.15
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

trait_generalization_strength = 0.6

coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

# places_enabled defaults to 0

snapshot_interval        = 2000
snapshot_at_tick_zero    = 1
log_events               = 1
output_dir               = output/witness_v1_30k_no_places
