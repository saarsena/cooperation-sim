# Control for the witness_v1 dynamics check.
#
# Identical to witness_v1.conf in every parameter that affects trust /
# venture / partner-selection dynamics — same seed, same run length, same
# loss-aversion ratio, same generalization strength. The only difference
# is places_enabled=0 (the default), so the simulation runs without the
# witness-world places module.
#
# Hypothesis: places are pure annotators and do not feed back into trust
# dynamics. If correct, this control's trait-success matrix should match
# witness_v1's matrix to within RNG-irrelevant noise. If it doesn't match,
# something in the places wiring is leaking into the dynamics.

seed                     = 42
max_ticks                = 10000
initial_population       = 40

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.4
trust_success_weight     = 0.5

trust_gain_on_success    = 0.10
trust_loss_on_failure    = 0.15
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

trait_generalization_strength = 0.6

coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

# Default (places_enabled=0) — no places module activity at all.

snapshot_interval        = 1000
snapshot_at_tick_zero    = 1
log_events               = 1
output_dir               = output/witness_v1_no_places
