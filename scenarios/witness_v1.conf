# Witness V1 — Phase 1 (places).
#
# Same dynamics as witness_v0.conf (markers + loss-aversion), 10k ticks, with
# the witness-world places module enabled. Ventures now happen at one of 12
# named locations. Agents accumulate per-place preferences, and new agents
# inherit a weak prior from the currently-living population.
#
# This is the load-bearing scenario for the Phase 1 prose check: do
# biographies render places naturally, and does a place-biography read as a
# coherent story about a place rather than as a list of disconnected events?

seed                     = 42
max_ticks                = 10000
initial_population       = 40

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.4
trust_success_weight     = 0.5

trust_gain_on_success    = 0.10
trust_loss_on_failure    = 0.15
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

trait_generalization_strength = 0.6

coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

# Witness-world: places module on. Defaults for the rest of the place knobs
# match the design package (gain 0.05, loss 0.07, decay 0.001, inherit
# strength 0.2, inherit window = spawn_interval).
places_enabled                  = 1

snapshot_interval        = 1000
snapshot_at_tick_zero    = 1
log_events               = 1
output_dir               = output/witness_v1
