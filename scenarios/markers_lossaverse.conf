# Experiment 2b: pure marker discrimination under loss-averse trust updates.
#
# Same as markers_only.conf, except trust_loss_on_failure (0.15) now exceeds
# trust_gain_on_success (0.10). Hypothesis: loss-aversion lets small random
# early gaps in trait-prior outcomes lock in, since the down-shift on a bad
# venture is harder to walk back than the up-shift on a good one.

seed                     = 42
max_ticks                = 30000
initial_population       = 40

initial_resources_min    = 50
initial_resources_max    = 150
metabolism               = 1.0

venture_cost             = 3.0
venture_reward           = 8.0
base_success_prob        = 0.4
trust_success_weight     = 0.5

trust_gain_on_success    = 0.10
trust_loss_on_failure    = 0.15
trust_decay              = 0.002
trust_baseline           = 0.0

exploration_rate         = 0.1
venture_chance           = 0.4

spawn_interval           = 50

# Trait generalization IS the lever. 0.3 is a moderate setting.
trait_generalization_strength = 0.6

# Leave hidden quality completely flat — traits are markers only.
coop_quality_sigma              = 0.0
trait_quality_correlation       = 0.0
coop_quality_success_weight     = 0.0
coop_quality_payoff_scale       = 0.0

snapshot_interval        = 2000
log_events               = 0
output_dir               = output/markers_lossaverse
